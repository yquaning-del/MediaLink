name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # ── Backend ──────────────────────────────────────────────────────
  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: medialink
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: medialink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.32.1'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend exec prisma generate
        env:
          DATABASE_URL: postgresql://medialink:testpassword@localhost:5432/medialink_test

      - name: Run Prisma migrations
        run: pnpm --filter backend exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://medialink:testpassword@localhost:5432/medialink_test

      - name: Lint
        run: pnpm --filter backend lint

      - name: Type check
        run: pnpm --filter backend exec tsc --noEmit

      - name: Run tests
        run: pnpm --filter backend test
        env:
          DATABASE_URL: postgresql://medialink:testpassword@localhost:5432/medialink_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-minimum-32-chars
          BCRYPT_ROUNDS: '10'
          PAYSTACK_SECRET_KEY: test_sk_xxx
          NODE_ENV: test
          PORT: '4000'
          FRONTEND_URL: http://localhost:3000
          API_URL: http://localhost:4000
          TWILIO_ACCOUNT_SID: test_sid
          TWILIO_AUTH_TOKEN: test_token
          TWILIO_PHONE_NUMBER: +15005550006
          SENDGRID_API_KEY: SG.test_key
          SENDGRID_FROM_EMAIL: test@test.com
          AWS_ACCESS_KEY_ID: test_key
          AWS_SECRET_ACCESS_KEY: test_secret
          AWS_REGION: eu-west-1
          S3_BUCKET_PROFILES: test-profiles
          S3_BUCKET_DOCUMENTS: test-documents

  # ── Frontend ─────────────────────────────────────────────────────
  frontend-lint-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.32.1'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter frontend exec tsc --noEmit

      - name: Lint
        run: pnpm --filter frontend lint

      - name: Build
        run: pnpm --filter frontend build
        env:
          NEXT_PUBLIC_API_URL: https://api.medialink.com.gh/api
          NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: pk_test_placeholder

  # ── Docker Build & Push (main branch only) ───────────────────────
  docker-build:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: packages/backend
          file: packages/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/medialink-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/medialink-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/medialink-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/medialink-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Mobile ──────────────────────────────────────────────────────
  mobile-typecheck:
    name: Mobile — Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.32.1'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter mobile exec tsc --noEmit

  # ── Security Scan ─────────────────────────────────────────────────
  security-scan:
    name: Security — Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.32.1'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true
